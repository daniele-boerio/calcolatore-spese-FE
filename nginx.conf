server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Asset con hash nel nome (es. index-ab12cd.js): contenuto immutabile,
    # si possono cachare "per sempre".
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # index.html: NON deve mai essere cachato, altrimenti dopo un deploy i
    # dispositivi (soprattutto le webapp iOS in home) continuano a puntare ai
    # vecchi bundle JS rimossi -> schermata bianca.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Il manifest può cambiare: meglio rivalidarlo sempre.
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        expires -1;
    }

    # SPA fallback: ogni rotta non-file ricade su index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
